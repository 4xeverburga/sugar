name: publish

on:
  workflow_run:
    workflows: ["ci-main", "ci-dev"]
    types: [completed]
    branches: [main, dev]

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # npm@latest is currently broken for `npm publish` on Node 24 runners:
      # libnpmpublish's provenance-detection code (added for npm's new
      # Trusted Publishing/OIDC support) unconditionally requires `sigstore`,
      # which is missing from the published npm@latest tarball. Pin to the
      # last known-good major until that's fixed upstream — revisit when
      # actually adopting trusted publishing (which needs a newer npm anyway).
      - name: Install known-good npm
        run: npm install -g npm@10

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump version with dev suffix
        if: ${{ github.event.workflow_run.head_branch == 'dev' }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./package.json').version")
          npm version "${VERSION}-dev.${COMMIT}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public

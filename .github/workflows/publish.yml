name: publish

on:
  workflow_run:
    workflows: ["ci-main", "ci-dev"]
    types: [completed]
    branches: [main, dev]

permissions:
  id-token: write # Required for npm OIDC trusted publishing
  contents: read

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm >= 11.5.1. npm@latest (12.x) is
      # currently broken for provenance-enabled publishes: libnpmpublish's
      # provenance code requires `sigstore`, which is missing from the
      # published npm@latest tarball (npm/cli#9722). Pin to the 11.x line,
      # which supports trusted publishing and still bundles sigstore.
      - name: Install npm with working OIDC + provenance support
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump version with dev suffix
        if: ${{ github.event.workflow_run.head_branch == 'dev' }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./package.json').version")
          npm version "${VERSION}-dev.${COMMIT}" --no-git-tag-version

      - name: Publish to npm
        # Authenticated via OIDC trusted publishing (id-token: write above) —
        # no NODE_AUTH_TOKEN/NPM_TOKEN needed. Requires a trusted publisher
        # configured for this package on npmjs.com pointing at this repo +
        # workflow filename (publish.yml).
        run: npm publish --access public

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --access public

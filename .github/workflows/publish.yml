name: publish

on:
  workflow_run:
    workflows: ["ci-main", "ci-dev"]
    types: [completed]
    branches: [main, dev]

permissions:
  id-token: write # Required for npm OIDC trusted publishing
  contents: read

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # OIDC trusted publishing needs npm >= 11.5.1. npm@latest (12.x) is
      # currently broken for provenance-enabled publishes: libnpmpublish's
      # provenance code requires `sigstore`, which is missing from the
      - name: Install npm with working OIDC + provenance support
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Bump version with dev suffix
        if: ${{ github.event.workflow_run.head_branch == 'dev' }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./package.json').version")
          npm version "${VERSION}-dev.${COMMIT}" --no-git-tag-version

      - name: Publish to npm
        # Authenticated via OIDC trusted publishing (id-token: write above) —
        # dev builds are prerelease versions and must NOT take the `latest`
        # dist-tag, otherwise a bare `npm install sugar-skills` would
        # install them. Only main builds get `latest`.
        run: |
          if [ "${{ github.event.workflow_run.head_branch }}" = "dev" ]; then
            npm publish --access public --tag dev
          else
            npm publish --access public
          fi


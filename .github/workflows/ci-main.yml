name: ci-main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce main promotion via dev
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "PRs to main must come from dev. Current source: ${{ github.head_ref }}"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npx oxlint . --deny-warnings

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
